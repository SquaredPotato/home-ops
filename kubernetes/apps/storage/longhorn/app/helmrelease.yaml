---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 15m
  chart:
    spec:
      chart: longhorn
      version: "1.11.2"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  # https://github.com/longhorn/longhorn/blob/master/chart/values.yaml
  values:
    persistence:
      defaultDataLocality: best-effort
      reclaimPolicy: Retain
    defaultSettings:
      dataEngine: v2
      v1DataEngine: false
      v2DataEngine: true
      defaultDataPath: /dev/disk/by-partlabel/r-longhorn-data
      allowRecurringJobWhileVolumeDetached: true
      snapshotDataIntegrity: "enabled"
      restoreVolumeRecurringJobs: true
      node-down-pod-deletion-policy: "delete-both-statefulset-and-deployment-pod"
      node-drain-policy: "block-for-eviction-if-contains-last-replica"
      orphanResourceAutoDeletion: "replica-data;instance"
      backupTarget: "s3://longhorn.mizuto.backup@eu-central-1/"
    metrics:
      serviceMonitor:
        enabled: true
    httproute:
      enabled: true
      parentRefs:
        - name: internal
          namespace: network
          sectionName: https
      hostnames:
        - "longhorn.${SECRET_DOMAIN}"
      annotations:
        gatus.home-operations.com/endpoint: |-
          name: Longhorn Dashboard
          conditions: ["[STATUS] == 200"]
    ingress:
      enabled: false
    defaultBackupStore:
      backupTarget: "s3://longhorn.mizuto.backup@eu-central-1/"
      backupTargetCredentialSecret: longhorn-wasabi-access
      pollInterval: 300
