---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cluster-apps-node-feature-discovery
  namespace: kube-system
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: node-feature-discovery
  maxHistory: 2
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    topologyUpdater:
      updateInterval: 1800
