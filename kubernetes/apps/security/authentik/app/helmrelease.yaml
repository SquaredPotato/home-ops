---
# yaml-language-server: $schema=https://kubernetes-schemas.zinn.ca/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name authentik
  namespace: security
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *name
  values:
    global:
      podAnnotations:
        secret.reloader.stakater.com/reload: &secret authentik-secret
      podAntiAffinity: hard
      deploymentStrategy:
        type: RollingUpdate
      envFrom:
        - secretRef:
            name: *secret
      volumeMounts:
        - name: *name
          mountPath: /data/media/public/branding
      volumes:
        - name: *name
          persistentVolumeClaim:
            claimName: *name
    server:
      replicas: 2
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      route:
        main:
          annotations:
            gatus.home-operations.com/endpoint: |-
              name: Authentik
          enabled: true
          parentRefs:
            - name: external
              namespace: network
              sectionName: https
          hostnames:
            - "sso.${SECRET_DOMAIN}"
          https: false
    worker:
      replicas: 2
      metrics:
        enabled: true
    prometheus:
      rules:
        enabled: true
