---
name: Template sync
on:
  schedule:
    - cron: "0 0 1 * *"
  # Manual trigger
  workflow_dispatch:
jobs:
  template-sync:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: "${{ secrets.TEMPLATE_SYNC_PAT }}"
      - name: actions-template-sync
        uses: AndreasAugustin/actions-template-sync@8a0f668b83c32a0f673353086d74f12b8853d4f5 # v2
        with:
          source_repo_path: "onedr0p/cluster-template"
          upstream_branch: main
          pr_labels: chore
          target_gh_token: "${{ secrets.TEMPLATE_SYNC_PAT }}"
