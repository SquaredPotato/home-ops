---
# yaml-language-server: $schema=https://schemas.zinn.ca/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: alloy
  values:
    fullnameOverride: alloy
    serviceMonitor:
      enabled: true
    alloy:
      configMap:
        create: false
        name: alloy-configmap
        key: config.alloy
    controller:
      podAnnotations:
        reloader.stakater.com/auto: "true"
      tolerations: # Also run on control plane
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    rbac:
      create: true

    serviceAccount:
      create: true
      name: alloy

    # Extra permissions for node metrics
    clusterRole:
      create: true
      rules:
        - apiGroups: [ "" ]
          resources:
            - nodes
            - nodes/proxy
            - nodes/metrics
            - services
            - endpoints
            - pods
            - events
            - namespaces
          verbs: [ "get", "list", "watch" ]
        - apiGroups: [ "" ]
          resources:
            - configmaps
          verbs: [ "get" ]
        - nonResourceURLs:
            - /metrics
            - /metrics/cadvisor
          verbs: [ "get" ]

    # Volume mounts for system access
    extraVolumes:
      - name: hostfs
        hostPath:
          path: /
      - name: varlog
        hostPath:
          path: /var/log

    extraVolumeMounts:
      - name: hostfs
        mountPath: /host
        readOnly: true
      - name: varlog
        mountPath: /var/log
        readOnly: true
