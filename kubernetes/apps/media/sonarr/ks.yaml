---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app user-apps-sonarr
  namespace: &namespace media
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./kubernetes/apps/media/sonarr/app
  dependsOn:
    - name: cluster-apps-longhorn
      namespace: storage
    - name: cluster-apps-cloudnative-pg-cluster
      namespace: database
    - name: user-apps-qbittorrent
      namespace: downloads
    - name: user-apps-prowlarr
      namespace: downloads
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  targetNamespace: *namespace
