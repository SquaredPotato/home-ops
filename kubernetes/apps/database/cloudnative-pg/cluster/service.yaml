---
apiVersion: v1
kind: Service
metadata:
  name: production-lb
  namespace: database
  annotations:
    external-dns.alpha.kubernetes.io/hostname: production.abchost.nl
    lbipam.cilium.io/ips: ${CLUSTER_CLOUDNATIVE_PG_17_IP}
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  ports:
    - name: production-rw
      port: 5432
      protocol: TCP
      targetPort: 5432
  selector:
    cnpg.io/cluster: production
    cnpg.io/instanceRole: primary
