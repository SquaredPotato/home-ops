---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app blocky
  namespace: &namespace network
spec:
  interval: 1h
  path: ./kubernetes/apps/network/blocky
  dependsOn:
    - name: cluster-apps-redis
      namespace: database
  ################################################
  ## DONT REMOVE DECRYPTION AND POSTBUILD BLOCK ##
  ## CONFIGMAPGENERATOR DOESN'T RUN AFTER FLUX  ##
  ## PATCHES ARE APPLIED - AFTER IT ALREADY     ##
  ## STARTED THE KUSTOMIZATION                  ##
  ################################################
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: cluster-settings
        kind: ConfigMap
        optional: false
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: true
  prune: true
