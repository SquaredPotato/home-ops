---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app blocky
  namespace: &namespace network
spec:
  interval: 1h
  path: ./kubernetes/apps/network/blocky
  dependsOn:
    - name: cluster-apps-redis
      namespace: database
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: true
  prune: true
