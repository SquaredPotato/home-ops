apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: riva
spec:
  interval: 1h
  chart:
    spec:
      chart: wordpress
      version: 29.2.2
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 1h
  values:
    wordpressUsername: aEu8162BN
    existingSecret: riva-secret
    wordpressConfigureCache: true
    service:
      type: ClusterIP
    persistence:
      enabled: true
      storageClass: "longhorn"
      existingClaim: "riva"
    mariadb:
      enabled: false
    externalDatabase:
      host: "mariadb-cluster-primary.database"
      port: 3306
      user: riva
      database: riva
      existingSecret: riva-secret
    smtpHost: ${SMTP_HOST}
    smtpPort: ${SMTP_PORT}
    smtpUser: ${SMTP_USERNAME}
    smtpPassword: ${SMTP_PASSWORD}
    smtpProtocol: tls
    smtpFromName: "admin"
    replicaCount: 2
    updateStrategy:
      type: RollingUpdate
    resourcesPreset: "medium"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    memcached:
      enabled: true
      resourcesPreset: medium
      service:
        port: 11211
    extraVolumeMounts:
      - name: wordpress-config
        mountPath: /opt/bitnami/php/etc/conf.d/php-custom.ini
        subPath: php-custom.ini
      - name: wordpress-config
        mountPath: /opt/bitnami/apache/conf.default/vhosts/remoteip.conf
        subPath: remoteip.conf
    extraVolumes:
      - name: wordpress-config
        configMap:
          defaultMode: 420
          name: wordpress-config